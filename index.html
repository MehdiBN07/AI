<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00d2ff; --bg-dark: #02040a; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; }
        .app-container { display: flex; height: 100vh; }
        .main-shell { flex: 1; display: flex; flex-direction: column; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-blue); }
        .custom-login-btn { cursor:pointer; background: transparent; border: 1px solid var(--neon-blue); padding: 8px 16px; border-radius: 20px; color: var(--neon-blue); }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon-blue); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-shell">
        <header>
            <h1 style="color:var(--neon-blue); margin:0;">MIRAGE AI</h1>
            <div id="auth-container"></div>
        </header>
        <div id="chat-display" style="flex:1;"></div>
    </div>
</div>

<script>
    // الإعدادات
    const GOOGLE_CLIENT_ID = "86451093308-m5t74arb2v706v50qbls4pfoc4q4b0v1.apps.googleusercontent.com";
    const firebaseConfig = {
        apiKey: "AIzaSyAGlPJDsGdA6Y2BShTy3LJeguYfT5ahfgI",
        authDomain: "mirageai-1ff67.firebaseapp.com",
        projectId: "mirageai-1ff67",
        storageBucket: "mirageai-1ff67.appspot.com",
        messagingSenderId: "54774597616",
        appId: "1:54774597616:web:c084ed8283943d51b7bf35"
    };
    
    firebase.initializeApp(firebaseConfig);
    let currentUser = JSON.parse(localStorage.getItem('mirage_user'));

    // تهيئة جوجل
    window.onload = () => {
        if (typeof google !== 'undefined') {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });
        }
        updateAuthUI();
    };

    function handleCredentialResponse(response) {
        const payload = JSON.parse(window.atob(response.credential.split('.')[1]));
        currentUser = { name: payload.given_name, img: payload.picture, email: payload.email };
        localStorage.setItem('mirage_user', JSON.stringify(currentUser));
        updateAuthUI();
    }

    function updateAuthUI() {
        const container = document.getElementById('auth-container');
        if (currentUser) {
            container.innerHTML = `
                <div class="user-profile">
                    <img src="${currentUser.img}" class="user-avatar">
                    <button onclick="handleLogout()" style="background:none; border:none; color:red; cursor:pointer;">خروج</button>
                </div>`;
        } else {
            container.innerHTML = `
                <button class="custom-login-btn" onclick="google.accounts.id.prompt()">تسجيل الدخول</button>`;
        }
    }

    function handleLogout() {
        localStorage.removeItem('mirage_user');
        currentUser = null;
        updateAuthUI();
    }
</script>
</body>
</html>
