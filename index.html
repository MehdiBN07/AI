<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Tajawal:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --neon-blue: #00d2ff; --led-glow: #008fcc; --bg-dark: #02040a; --glass-border: rgba(0, 210, 255, 0.2); }
        body, html { height: 100%; margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Tajawal', sans-serif; overflow: hidden; }
        .app-container { display: flex; height: 100%; width: 100%; position: relative; }
        .sidebar { width: 280px; background: #040814; border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; position: absolute; top: 0; bottom: 0; right: 0; transform: translateX(100%); transition: 0.3s; z-index: 30; }
        .app-container.sidebar-open .sidebar { transform: translateX(0); }
        .main-shell { flex: 1; display: flex; flex-direction: column; height: 100%; background: var(--bg-dark); }
        header { height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-blue); }
        #chat-display { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 140px; }
        .reviews-section { padding: 15px; border-top: 1px solid var(--glass-border); margin-top: auto; }
        .review-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 8px 0; border-radius: 8px; border-right: 3px solid var(--neon-blue); font-size: 13px; }
        .del-btn { color: #ff4a4a; cursor: pointer; margin-right: 10px; }
        /* المودال المخصص */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:#0a0e1a; border:1px solid var(--neon-blue); padding:25px; border-radius:20px; width:90%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div class="app-container" id="app-shell">
    <div class="sidebar">
        <div class="chat-list" id="sessions-container"></div>
        <div class="reviews-section">
            <h4 style="color:var(--neon-blue); margin-top:0;">تقييمات المدار:</h4>
            <div id="reviews-list"></div>
            <button onclick="addReview()" style="width:100%; padding:8px; background:transparent; border:1px solid var(--neon-blue); color:white; border-radius:5px; cursor:pointer;">إضافة تقييم</button>
        </div>
    </div>

    <div class="main-shell">
        <header>
            <button onclick="document.getElementById('app-shell').classList.toggle('sidebar-open')" style="background:none; border:none; color:var(--neon-blue); font-size:24px;">☰</button>
            <h1 style="color:var(--neon-blue); font-size:1.2rem;">MIRAGE AI</h1>
            <div id="auth-container"></div>
        </header>
        <div id="chat-display"></div>
        <div class="input-wrapper" style="padding:15px; display:flex; gap:10px;">
            <input type="text" id="queryInput" style="flex:1; background:#111; color:white; border:1px solid #333; padding:10px; border-radius:20px;">
            <button onclick="handleSend()" style="background:var(--neon-blue); border:none; padding:10px 20px; border-radius:20px;">➤</button>
        </div>
    </div>
</div>

<div id="review-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--neon-blue);">أضف تقييمك</h3>
        <textarea id="review-text-input" style="width:100%; height:80px; background:#151a28; color:white; border:1px solid #333; border-radius:10px; padding:10px;"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeReviewModal()" style="flex:1; background:#333; border:none; color:white; padding:10px; border-radius:10px;">إلغاء</button>
            <button onclick="submitReviewFromModal()" style="flex:1; background:var(--neon-blue); border:none; color:black; padding:10px; border-radius:10px;">إرسال</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAGlPJDsGdA6Y2BShTy3LJeguYfT5ahfgI", authDomain: "mirageai-1ff67.firebaseapp.com", projectId: "mirageai-1ff67", storageBucket: "mirageai-1ff67.appspot.com", messagingSenderId: "54774597616", appId: "1:54774597616:web:c084ed8283943d51b7bf35" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = JSON.parse(localStorage.getItem('mirage_user'));

    // --- دوال التقييم المحدثة ---
    function addReview() {
        if(!currentUser) return alert("سجل دخولك أولاً!");
        document.getElementById('review-modal').style.display = 'flex';
    }
    function closeReviewModal() { document.getElementById('review-modal').style.display = 'none'; }
    function submitReviewFromModal() {
        const text = document.getElementById('review-text-input').value;
        if(text.trim()) {
            db.collection("reviews").add({ text, user: currentUser.name, email: currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('review-text-input').value = "";
            closeReviewModal();
        }
    }
    function loadReviews() {
        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('reviews-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `<div class="review-card"><strong>${data.user}:</strong> ${data.text}</div>`;
            });
        });
    }

    // --- استدعاءات البدء ---
    window.onload = () => {
        loadReviews();
        // (باقي منطقك الأصلي يعمل هنا)
    };
</script>
</body>
</html>
