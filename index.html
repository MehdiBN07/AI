<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Tajawal:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --neon-blue: #00d2ff; --led-glow: #008fcc; --bg-dark: #02040a; --glass-border: rgba(0, 210, 255, 0.2); --sidebar-width: 280px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }
        body, html { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Tajawal', sans-serif; overflow: hidden; user-select: none; }
        input[type="text"], textarea, .edit-input-field, .bubble, .bubble * { user-select: text !important; }
        .bubble a { color: var(--neon-blue); text-decoration: underline; cursor: pointer; pointer-events: auto !important; }
        .app-container { display: flex; height: 100%; width: 100%; position: relative; }
        .sidebar { width: var(--sidebar-width); background: #040814; border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 30; position: absolute; top: 0; bottom: 0; right: 0; transform: translateX(100%); }
        html[dir="ltr"] .sidebar { border-left: none; border-right: 1px solid var(--glass-border); right: auto; left: 0; transform: translateX(-100%); }
        .app-container.sidebar-open .sidebar { transform: translateX(0); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 10px; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        /* تنسيق التقييمات الجديد */
        .reviews-section { padding: 15px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); }
        .review-item { font-size: 12px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 5px; margin-bottom: 5px; border-right: 2px solid var(--neon-blue); }
        .add-review-btn { width: 100%; background: transparent; color: #fff; border: 1px solid var(--neon-blue); padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #review-modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #040814; padding: 20px; border-radius: 15px; border: 1px solid var(--neon-blue); width: 300px; }

        /* باقي تنسيقاتك الأصلية كما هي */
        .main-shell { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; background: var(--bg-dark); }
        header { height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon-blue); }
        .menu-toggle-btn { background: transparent; border: none; color: var(--neon-blue); font-size: 22px; cursor: pointer; }
        #chat-display { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 140px; }
        .bottom-fixed-area { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #000 80%, transparent); z-index: 20; }
        .input-wrapper { display: flex; align-items: center; gap: 12px; background: #080808; padding: 8px 16px; border-radius: 30px; border: 1px solid var(--glass-border); margin: 10px; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 0; font-size: 16px; font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body>

<div id="review-modal">
    <div class="modal-content">
        <h4 style="color:var(--neon-blue); margin-top:0;">أضف تقييمك</h4>
        <textarea id="review-input" style="width:100%; height:80px; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:8px;"></textarea>
        <button onclick="submitReview()" style="width:100%; margin-top:10px; padding:10px; background:var(--neon-blue); border:none; cursor:pointer;">إرسال</button>
        <button onclick="document.getElementById('review-modal').style.display='none'" style="width:100%; margin-top:5px; padding:5px; background:transparent; color:#888; border:none; cursor:pointer;">إلغاء</button>
    </div>
</div>

<div class="app-container" id="app-shell">
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn" onclick="startNewChat()">+ محادثة جديدة</button>
        </div>
        <div class="chat-list" id="sessions-container"></div>
        <div class="reviews-section">
            <div id="reviews-list" style="max-height: 150px; overflow-y: auto;"></div>
            <button class="add-review-btn" onclick="document.getElementById('review-modal').style.display='flex'">أضف تقييمك</button>
        </div>
    </div>

    <div class="main-shell">
        <header>
            <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
            <h1 style="color: var(--neon-blue); font-size: 1.25rem;">MIRAGE AI</h1>
        </header>
        <div id="chat-display"></div>
        <div class="bottom-fixed-area">
            <div class="console-container">
                <div class="input-wrapper">
                    <input type="text" id="queryInput" placeholder="أرسل رسالة للمدار...">
                    <button id="send-btn" onclick="handleSend()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = { apiKey: "AIzaSyAGlPJDsGdA6Y2BShTy3LJeguYfT5ahfgI", authDomain: "mirageai-1ff67.firebaseapp.com", projectId: "mirageai-1ff67", storageBucket: "mirageai-1ff67.appspot.com", messagingSenderId: "54774597616", appId: "1:54774597616:web:c084ed8283943d51b7bf35" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function submitReview() {
        const txt = document.getElementById('review-input').value;
        if(txt && currentUser) {
            db.collection("reviews").add({ user: currentUser.name, text: txt, time: Date.now() });
            document.getElementById('review-input').value = "";
            document.getElementById('review-modal').style.display = 'none';
        } else { alert("يجب تسجيل الدخول لإضافة تقييم"); }
    }

    db.collection("reviews").orderBy("time", "desc").onSnapshot(snap => {
        const list = document.getElementById('reviews-list');
        list.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `<div class="review-item"><strong>${d.user}:</strong> ${d.text}</div>`;
        });
    });

    // --- (ضع باقي كود الـ Script الأصلي الخاص بك هنا بالكامل بعد هذا السطر) ---
    // تم اختصار الكود هنا لتوفير المساحة، تأكد من لصق كودك الأصلي كاملاً هنا.
</script>
</body>
</html>
