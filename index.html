<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=500;900&family=Tajawal:wght=200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --neon-blue: #00d2ff; --led-glow: #008fcc; --bg-dark: #02040a; --glass-border: rgba(0, 210, 255, 0.2); --sidebar-width: 280px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }
        body, html { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Tajawal', sans-serif; overflow: hidden; user-select: none; }
        input[type="text"], textarea, .edit-input-field, .bubble, .bubble * { user-select: text !important; }
        .bubble a { color: var(--neon-blue); text-decoration: underline; cursor: pointer; pointer-events: auto !important; }
        .app-container { display: flex; height: 100%; width: 100%; position: relative; }
        .sidebar { width: var(--sidebar-width); background: #040814; border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 30; position: absolute; top: 0; bottom: 0; right: 0; transform: translateX(100%); }
        html[dir="ltr"] .sidebar { border-left: none; border-right: 1px solid var(--glass-border); right: auto; left: 0; transform: translateX(-100%); }
        .app-container.sidebar-open .sidebar { transform: translateX(0); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 10px; }
        .mobile-controls-container { display: none; flex-direction: column; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 210, 255, 0.1); }
        .new-chat-btn { width: 100%; background: transparent; color: var(--neon-blue); border: 1px dashed var(--neon-blue); padding: 12px; border-radius: 8px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: bold; transition: 0.3s; }
        .new-chat-btn:hover { background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 10px var(--led-glow); }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-item-wrapper { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 8px; padding: 4px 12px; transition: 0.2s; cursor: pointer; }
        .chat-item-wrapper:hover, .chat-item-wrapper.active { background: rgba(0, 210, 255, 0.05); border-color: var(--glass-border); }
        .chat-title-text { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; padding: 8px 0; }
        html[dir="ltr"] .chat-title-text { text-align: left; }
        .chat-item-wrapper.active .chat-title-text { color: var(--neon-blue); font-weight: bold; }
        .delete-chat-btn { background: transparent; border: none; color: #ff4a4a; cursor: pointer; font-size: 13px; padding: 8px; opacity: 0.7; transition: 0.2s; }
        .main-shell { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; background: var(--bg-dark); }
        header { height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon-blue); z-index: 10; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); backdrop-filter: blur(15px); }
        .menu-toggle-btn { background: transparent; border: none; color: var(--neon-blue); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px 12px; }
        .header-controls { display: flex; align-items: center; gap: 12px; }
        #auth-container { display: flex; align-items: center; justify-content: center; }
        .custom-login-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: rgba(0, 210, 255, 0.05); border: 1px solid var(--neon-blue); padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s ease; box-shadow: 0 0 10px rgba(0, 210, 255, 0.1); max-width: 180px; }
        .custom-login-btn:hover { background: rgba(0, 210, 255, 0.15); box-shadow: 0 0 15px var(--neon-blue); }
        .custom-login-btn img { width: 20px; height: 20px; object-fit: contain; border-radius: 50%; }
        .custom-login-btn span { color: #fff; font-size: 12px; font-weight: bold; font-family: 'Tajawal', sans-serif; white-space: nowrap; }
        .user-profile { display: flex; align-items: center; gap: 8px; background: rgba(0, 210, 255, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--neon-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .user-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--neon-blue); }
        .logout-btn { background: transparent; border: none; color: #ff4a4a; cursor: pointer; font-size: 13px; display: flex; align-items: center; }
        #chat-display { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 140px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14.5px; line-height: 1.6; word-wrap: break-word; position: relative; }
        .ai-msg { background: rgba(255, 255, 255, 0.03); align-self: flex-start; border: 1px solid rgba(0, 210, 255, 0.1); }
        .user-msg-container { display: flex; align-items: center; gap: 10px; align-self: flex-end; max-width: 85%; width: auto; }
        .user-msg { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon-blue); max-width: 100%; }
        .edit-msg-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); color: rgba(255,255,255,0.8); cursor: pointer; font-size: 13px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .edit-msg-btn:hover { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .edit-block-container { width: 100%; display: flex; flex-direction: column; gap: 8px; align-self: flex-end; max-width: 85%; }
        .edit-input-field { background: #111; color: #fff; border: 1px solid var(--neon-blue); border-radius: 12px; padding: 10px; width: 100%; font-family: 'Tajawal', sans-serif; font-size: 15px; resize: none; }
        .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .edit-actions button { padding: 6px 14px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: bold; }
        .save-edit-btn { background: var(--neon-blue); color: #000; }
        .cancel-edit-btn { background: #222; color: #fff; }
        .sidebar-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 25; display: none; }
        .app-container.sidebar-open .sidebar-overlay { display: block; }
        .bottom-fixed-area { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #000 80%, transparent); z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
        .copyright-bar { font-size: 9px; text-align: center; color: rgba(255, 255, 255, 0.3); padding: 8px 0; }
        .console-container { padding: 10px 15px 20px 15px; }
        .input-wrapper { display: flex; align-items: center; gap: 12px; background: #080808; padding: 8px 16px; border-radius: 30px; border: 1px solid var(--glass-border); }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 0; font-size: 16px; font-family: 'Tajawal', sans-serif; }
        .mem-toggle { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; filter: grayscale(1); transition: 0.3s; }
        .mem-toggle.active { border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.1); filter: grayscale(0); box-shadow: 0 0 10px var(--led-glow); }
        #send-btn { background: linear-gradient(45deg, var(--neon-blue), var(--led-glow)); color: #000; border-radius: 50%; width: 40px; height: 40px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #mirage-toast { position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-blue); color: #fff; padding: 15px 25px; border-radius: 15px; z-index: 1000; font-size: 13px; text-align: center; box-shadow: 0 0 30px var(--led-glow); opacity: 0; visibility: hidden; transition: 0.4s; pointer-events: none; max-width: 85%; }
        #mirage-toast.show { opacity: 1; visibility: visible; }
        .custom-context-menu { position: fixed; background: rgba(4, 8, 20, 0.95); border: 1px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); border-radius: 8px; padding: 5px 0; width: 160px; z-index: 2000; display: none; backdrop-filter: blur(10px); }
        .context-menu-item { padding: 10px 15px; font-size: 13.5px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s ease; text-align: right; }
        html[dir="ltr"] .context-menu-item { text-align: left; }
        .context-menu-item:hover { background: rgba(0, 210, 255, 0.15); color: var(--neon-blue); }
        .context-menu-item.delete-item { color: #ff4a4a; }
        .context-menu-item.delete-item:hover { background: rgba(255, 74, 74, 0.15); color: #ff6b6b; }
        .reviews-section { padding: 15px; border-top: 1px solid var(--glass-border); color: white; }
        .review-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 8px 0; border-radius: 8px; border-right: 3px solid var(--neon-blue); font-size: 13px; }
        .del-btn { color: #ff4a4a; cursor: pointer; margin-right: 10px; }

        /* تعديلات النافذة المخصصة */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; }
        .modal-box { background:#040814; border:1px solid var(--neon-blue); padding:20px; border-radius:15px; width:90%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 style="color:var(--neon-blue); margin-top:0;">إضافة تقييم</h3>
        <input type="text" id="modal-input" placeholder="اكتب تقييمك هنا..." style="width:100%; background:transparent; border:1px solid #333; color:white; padding:10px; border-radius:5px; margin:15px 0;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer; background:#333; color:white;">إلغاء</button>
            <button onclick="submitModal()" style="flex:1; padding:10px; border-radius:5px; border:none; cursor:pointer; background:var(--neon-blue); color:#000; font-weight:bold;">إرسال</button>
        </div>
    </div>
</div>

<div id="mirage-toast"></div>

<div id="custom-menu" class="custom-context-menu">
    <div class="context-menu-item" onclick="executeContextAction('copy')">📋 نسخ النص</div>
    <div class="context-menu-item delete-item" id="context-delete-option" onclick="executeContextAction('delete')">🗑️ حذف والنسيان</div>
</div>

<div class="app-container" id="app-shell">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="mobile-controls-container"><div id="mobile-auth-wrapper"></div></div>
            <button class="new-chat-btn" id="newChatBtn" onclick="startNewChat()">+ محادثة جديدة</button>
        </div>
        <div class="chat-list" id="sessions-container"></div>
        <div class="reviews-section">
            <h4 style="color:var(--neon-blue); margin-top:0;">تقييمات المدار:</h4>
            <div id="reviews-list"></div>
            <button onclick="openReviewModal()" style="width:100%; padding:8px; background:transparent; border:1px solid var(--neon-blue); color:white; border-radius:5px; cursor:pointer;">إضافة تقييم</button>
        </div>
    </div>

    <div class="main-shell">
        <header>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
                <h1 style="color: var(--neon-blue); font-size: 1.25rem; margin: 0; font-family: 'Orbitron', sans-serif; font-weight: 900;">MIRAGE AI</h1>
            </div>
            <div class="header-controls"><div id="auth-container"></div></div>
        </header>
        <div id="chat-display"></div>
        <div class="bottom-fixed-area">
            <div class="copyright-bar">جميع الحقوق محفوظة لدى ORBIT SYSTEM © 2026</div>
            <div class="console-container">
                <div class="input-wrapper">
                    <div id="memBtn" class="mem-toggle" onclick="handleMemoryClick()">🧠</div>
                    <input type="text" id="queryInput" placeholder="أرسل رسالة..." autocomplete="off">
                    <button id="send-btn" onclick="handleSend()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAGlPJDsGdA6Y2BShTy3LJeguYfT5ahfgI", authDomain: "mirageai-1ff67.firebaseapp.com", projectId: "mirageai-1ff67", storageBucket: "mirageai-1ff67.appspot.com", messagingSenderId: "54774597616", appId: "1:54774597616:web:c084ed8283943d51b7bf35" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دوال النافذة المخصصة
    function openReviewModal() {
        if(!currentUser) return showPopup("سجل دخولك أولاً للتقييم");
        document.getElementById('custom-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
    function submitModal() {
        const text = document.getElementById('modal-input').value;
        if(text) {
            db.collection("reviews").add({
                text: text,
                user: currentUser.name,
                email: currentUser.email,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('modal-input').value = "";
            closeModal();
        }
    }

    function loadReviews() {
        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const list = document.getElementById('reviews-list');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = "review-card";
                div.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
                if(currentUser && currentUser.email === "channelanime697@gmail.com") {
                    const del = document.createElement('span');
                    del.innerHTML = " 🗑️";
                    del.className = "del-btn";
                    del.onclick = () => db.collection("reviews").doc(doc.id).delete();
                    div.appendChild(del);
                }
                list.appendChild(div);
            });
        });
    }

    const GOOGLE_CLIENT_ID = "86451093308-m5t74arb2v706v50qbls4pfoc4q4b0v1.apps.googleusercontent.com";
    const CLOUD_STORAGE_API = "https://kvbin.org/api/v1/bins/"; 
    let allSessions = {}, currentSessionId = "", currentUser = null, targetedBubbleIndex = null, touchTimer = null;
    const LONG_PRESS_DURATION = 500;
    marked.setOptions({ gfm: true, breaks: true });

    window.onload = () => {
        const savedLang = localStorage.getItem('mirage_lang') || 'ar';
        changeLang(savedLang, false); 
        const savedUser = localStorage.getItem('mirage_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
            fetchCloudSessions(); 
        } else {
            initGoogleSignIn();
            updateAuthUI();
            loadLocalSessions(); 
        }
        loadReviews();
    };

    function toggleSidebar() { document.getElementById('app-shell').classList.toggle('sidebar-open'); }
    function saveAllData() { if (currentUser) saveToCloud(); else { localStorage.setItem('mirage_all_sessions', JSON.stringify(allSessions)); localStorage.setItem('mirage_current_session', currentSessionId); } }
    function loadLocalSessions() { allSessions = JSON.parse(localStorage.getItem('mirage_all_sessions') || '{}'); if (Object.keys(allSessions).length === 0) startNewChat(); else { currentSessionId = localStorage.getItem('mirage_current_session') || Object.keys(allSessions)[0]; renderChat(); renderSidebarList(); } }
    async function saveToCloud() { const cloudKey = btoa(currentUser.email).replace(/=/g, "").substring(0, 15); try { await fetch(`${CLOUD_STORAGE_API}${cloudKey}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ allSessions, currentSessionId }) }); } catch (e) {} }
    async function fetchCloudSessions() { const cloudKey = btoa(currentUser.email).replace(/=/g, "").substring(0, 15); document.getElementById('memBtn').classList.add('active'); try { const response = await fetch(`${CLOUD_STORAGE_API}${cloudKey}`); if (response.ok) { const data = await response.json(); if (data && data.allSessions) { allSessions = data.allSessions; currentSessionId = data.currentSessionId || Object.keys(allSessions)[0]; renderChat(); renderSidebarList(); showPopup("☁️ تم مزامنة بياناتك!"); return; } } } catch (e) {} startNewChat(); }
    function handleMemoryClick() { if (currentUser) showPopup("☁️ المزامنة السحابية نشطة!"); else { showPopup("🔐 سجل الدخول لتفعيل السحاب."); toggleSidebar(); } }
    function startNewChat() { currentSessionId = "session_" + Date.now(); allSessions[currentSessionId] = []; saveAllData(); renderChat(); renderSidebarList(); document.getElementById('app-shell').classList.remove('sidebar-open'); }
    function selectSession(id) { currentSessionId = id; saveAllData(); renderChat(); renderSidebarList(); document.getElementById('app-shell').classList.remove('sidebar-open'); }
    function deleteSession(id, event) { event.stopPropagation(); delete allSessions[id]; const remainingIds = Object.keys(allSessions); if (currentSessionId === id) { if (remainingIds.length > 0) currentSessionId = remainingIds[0]; else startNewChat(); } saveAllData(); renderChat(); renderSidebarList(); }
    function renderSidebarList() { const container = document.getElementById('sessions-container'); container.innerHTML = ""; Object.keys(allSessions).forEach(id => { const messages = allSessions[id]; const title = messages.find(m => m.type === 'user-msg')?.text || "محادثة فارغة"; const wrapper = document.createElement('div'); wrapper.className = `chat-item-wrapper ${id === currentSessionId ? 'active' : ''}`; wrapper.onclick = () => selectSession(id); wrapper.innerHTML = `<span class="chat-title-text">${title}</span><button class="delete-chat-btn" onclick="deleteSession('${id}', event)">🗑️</button>`; container.appendChild(wrapper); }); }
    function renderChat() { const display = document.getElementById('chat-display'); display.innerHTML = ''; (allSessions[currentSessionId] || []).forEach((msg, index) => { const div = document.createElement('div'); div.className = `bubble ${msg.type}`; div.setAttribute('data-index', index); div.innerHTML = marked.parse(msg.text); attachTouchEvents(div); display.appendChild(div); }); display.scrollTop = display.scrollHeight; }
    async function handleSend() { const input = document.getElementById('queryInput'); const query = input.value.trim(); if (!query) return; if(!allSessions[currentSessionId]) allSessions[currentSessionId] = []; allSessions[currentSessionId].push({type: 'user-msg', text: query}); saveAllData(); renderChat(); renderSidebarList(); input.value = ''; const loadingDiv = addBubble('ai-msg', "..."); try { const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(query)}`); const aiResponse = await response.text(); loadingDiv.innerHTML = marked.parse(aiResponse.trim()); allSessions[currentSessionId].push({type: 'ai-msg', text: aiResponse.trim()}); saveAllData(); } catch (e) { loadingDiv.innerText = "خطأ."; } }
    function initGoogleSignIn() { if (typeof google !== 'undefined') google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse }); }
    function triggerGoogleAuth() { if (typeof google !== 'undefined') google.accounts.id.prompt(); }
    function handleCredentialResponse(response) { const payload = JSON.parse(window.atob(response.credential.split('.')[1])); currentUser = { name: payload.given_name, img: payload.picture, email: payload.email }; localStorage.setItem('mirage_user', JSON.stringify(currentUser)); updateAuthUI(); fetchCloudSessions(); }
    function updateAuthUI() { const container = document.getElementById('auth-container'); if (currentUser) container.innerHTML = `<div class="user-profile"><img src="${currentUser.img}" class="user-avatar"><button class="logout-btn" onclick="handleLogout()">🚪</button></div>`; else container.innerHTML = `<div class="custom-login-btn" onclick="triggerGoogleAuth()"><span>تسجيل</span></div>`; }
    function handleLogout() { localStorage.removeItem('mirage_user'); currentUser = null; updateAuthUI(); loadLocalSessions(); }
    function showPopup(text) { const toast = document.getElementById('mirage-toast'); toast.innerText = text; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3500); }
    function addBubble(cls, txt) { const div = document.createElement('div'); div.className = `bubble ${cls}`; div.innerHTML = marked.parse(txt); document.getElementById('chat-display').appendChild(div); return div; }
    function changeLang(l, updateWelcome = true) { document.getElementById('html-tag').dir = (l === 'ar' ? 'rtl' : 'ltr'); localStorage.setItem('mirage_lang', l); renderSidebarList(); }
    function attachTouchEvents(el) { el.addEventListener('touchstart', (e) => { touchTimer = setTimeout(() => openContextMenu(e.touches[0].clientX, e.touches[0].clientY, el), LONG_PRESS_DURATION); }, {passive:false}); el.addEventListener('touchend', () => clearTimeout(touchTimer)); }
    function openContextMenu(x, y, el) { targetedBubbleIndex = parseInt(el.getAttribute('data-index')); document.getElementById('custom-menu').style.cssText = `display:block; top:${y}px; left:${x}px;`; }
    function hideContextMenu() { document.getElementById('custom-menu').style.display = 'none'; }
    function executeContextAction(a) { if(a === 'delete' && targetedBubbleIndex !== null) { allSessions[currentSessionId].splice(targetedBubbleIndex, 1); saveAllData(); renderChat(); } hideContextMenu(); }
    document.addEventListener('click', hideContextMenu);
</script>
</body>
</html>
