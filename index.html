<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    <!-- استدعاء الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Tajawal:wght@200;400;700&display=swap" rel="stylesheet">
    <!-- مكتبة Marked لتنسيق النصوص -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- مكتبة جوجل الرسمية لتسجيل الدخول -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --led-glow: #008fcc; 
            --bg-dark: #02040a; 
            --glass-border: rgba(0, 210, 255, 0.2);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none !important; 
        }

        body, html { 
            height: 100%; margin: 0; padding: 0; 
            background: var(--bg-dark); color: #fff; 
            font-family: 'Tajawal', sans-serif; overflow: hidden; 
        }
        
        .main-shell { 
            display: flex; flex-direction: column; height: 100%; 
            width: 100%; max-width: 850px; margin: 0 auto; position: relative; 
        }
        
        header { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon-blue); z-index: 10; flex-shrink: 0; 
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            backdrop-filter: blur(15px);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* تنسيق بروفايل المستخدم بعد تسجيل الدخول */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--neon-blue);
        }
        .logout-btn {
            background: transparent;
            border: none;
            color: #ff4a4a;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Tajawal', sans-serif;
            padding: 0 4px;
        }

        #chat-display { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; 
            gap: 12px; padding-bottom: 140px; -webkit-overflow-scrolling: touch; 
        }

        .bubble a {
            color: var(--neon-blue);
            text-decoration: underline;
            word-break: break-all;
            text-shadow: 0 0 5px var(--led-glow);
        }
        .bubble p { margin: 0 0 8px 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { margin: 5px 0; padding-inline-start: 20px; }
        .bubble li { margin-bottom: 4px; }
        .bubble h1, .bubble h2, .bubble h3 { 
            color: var(--neon-blue); 
            margin: 10px 0 6px 0; 
            font-size: 1.1rem;
        }

        #mirage-toast {
            position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-blue); color: #fff;
            padding: 15px 25px; border-radius: 15px; z-index: 1000; font-size: 13px;
            text-align: center; box-shadow: 0 0 30px var(--led-glow);
            opacity: 0; visibility: hidden; transition: 0.4s; pointer-events: none;
            max-width: 85%; line-height: 1.4;
        }
        #mirage-toast.show { opacity: 1; visibility: visible; }

        .bottom-fixed-area { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: linear-gradient(to top, #000 80%, transparent); 
            z-index: 20; padding-bottom: env(safe-area-inset-bottom); 
        }
        
        .copyright-bar { 
            font-size: 9px; font-weight: 200; text-align: center; 
            color: rgba(255, 255, 255, 0.3); padding: 8px 0; letter-spacing: 1px; 
        }
        .copyright-bar a { color: var(--neon-blue); text-decoration: none; }

        .console-container { padding: 10px 15px 20px 15px; }
        
        .input-wrapper { 
            display: flex; align-items: center; gap: 12px; 
            background: #080808; padding: 8px 16px; border-radius: 30px; 
            border: 1px solid var(--glass-border); 
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.05);
        }

        input[type="text"] { 
            flex: 1; background: transparent; border: none; color: #fff; 
            padding: 10px 0; outline: none; font-size: 16px; font-family: 'Tajawal', sans-serif; 
        }
        
        .mem-toggle { 
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid #222; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; transition: 0.3s; cursor: pointer; filter: grayscale(1);
        }
        .mem-toggle.active { 
            border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.1); 
            box-shadow: 0 0 15px var(--led-glow); filter: grayscale(0);
        }
        
        #send-btn { 
            background: linear-gradient(45deg, var(--neon-blue), var(--led-glow)); 
            color: #000; border-radius: 50%; width: 40px; height: 40px; border: none; 
            font-size: 20px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--led-glow);
            display: flex; align-items: center; justify-content: center;
        }
        #send-btn:active { transform: scale(0.9); }

        html[dir="ltr"] #send-btn { transform: scaleX(-1); }
        html[dir="ltr"] #send-btn:active { transform: scaleX(-1) scale(0.9); }

        .bubble { 
            padding: 14px 18px; border-radius: 20px; max-width: 85%; 
            font-size: 14.5px; line-height: 1.6; word-wrap: break-word;
        }
        
        .ai-msg { 
            background: rgba(255, 255, 255, 0.03); align-self: flex-start; 
            border: 1px solid rgba(0, 210, 255, 0.1); 
        }
        
        .user-msg { 
            background: rgba(0, 210, 255, 0.1); align-self: flex-end; 
            border: 1px solid var(--neon-blue); 
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.1);
        }

        #chat-display::-webkit-scrollbar { width: 4px; }
        #chat-display::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="mirage-toast"></div>

<div class="main-shell">
    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <a href="https://mehdibn07.github.io/ORBIT/" style="text-decoration:none; font-size:1.5rem; color: var(--neon-blue);">🛸</a>
            <h1 style="color: var(--neon-blue); font-size: 1.25rem; margin: 0; font-family: 'Orbitron', sans-serif; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 12px var(--led-glow);">MIRAGE AI</h1>
        </div>
        
        <div class="header-controls">
            <!-- مساحة زر جوجل أو ملف المستخدم الشخصي -->
            <div id="auth-container">
                <div id="google-btn"></div>
            </div>

            <select id="langSelect" onchange="changeLang(this.value)" style="background:#111; color:var(--neon-blue); border:1px solid #333; font-size:11px; border-radius:8px; padding: 5px; outline:none; cursor: pointer;">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </header>

    <div id="chat-display"></div>

    <div class="bottom-fixed-area">
        <div class="copyright-bar">
            جميع الحقوق محفوظة لدى <a href="https://mehdibn07.github.io/ORBIT/">ORBIT SYSTEM</a> © 2026
        </div>
        <div class="console-container">
            <div class="input-wrapper">
                <div id="memBtn" class="mem-toggle" onclick="toggleMemory()">🧠</div>
                <input type="text" id="queryInput" placeholder="أرسل رسالة للمدار..." autocomplete="off">
                <button id="send-btn" onclick="handleSend()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // تم هنا تحديث مفتاح الـ Client ID الحقيقي الخاص بك بنجاح
    const GOOGLE_CLIENT_ID = "86451093308-m5t74arb2v706v50qbls4pfoc4q4b0v1.apps.googleusercontent.com";

    let memory = [];
    let currentUser = null;

    const translations = {
        ar: { placeholder: "أرسل رسالة للمدار...", waiting: "جاري الإجابة...", welcome: "نظام MIRAGE AI جاهز. قم بتفعيل الذاكرة (🧠) لحفظ سجل المحادثات على جهازك.", mem_on: "الذاكرة نشطة 📱", mem_off: "تم مسح السجلات 🗑️", sync: "تمت مزامنة بيانات المدار 🪐", login: "تم تسجيل الدخول بنجاح! 👋", logout: "تم تسجيل الخروج 🚪" },
        en: { placeholder: "Message Orbit...", waiting: "Answering...", welcome: "MIRAGE AI is ready. Enable memory (🧠) to save chat history on your device.", mem_on: "Memory Active 📱", mem_off: "Records Cleared 🗑️", sync: "Orbit data synced 🪐", login: "Logged in successfully! 👋", logout: "Logged out 🚪" },
        fr: { placeholder: "Message Orbite...", waiting: "Réponse en cours...", welcome: "MIRAGE AI est prêt. Activez la mémoire (🧠) pour sauvegarder l'historique.", mem_on: "Mémoire Active 📱", mem_off: "Registres Effacés 🗑️", sync: "Données synchronisées 🪐", login: "Connexion réussie! 👋", logout: "Déconnexion 🚪" }
    };

    marked.setOptions({ gfm: true, breaks: true });

    function formatText(text) { return marked.parse(text); }

    window.onload = () => {
        const savedLang = localStorage.getItem('mirage_lang') || 'ar';
        document.getElementById('langSelect').value = savedLang;
        changeLang(savedLang, false); 
        
        const savedUser = localStorage.getItem('mirage_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
        } else {
            initGoogleSignIn();
        }

        if(localStorage.getItem('mirage_mem_on') === 'true') {
            document.getElementById('memBtn').classList.add('active');
            memory = JSON.parse(localStorage.getItem('mirage_history') || '[]');
            renderChat();
            showPopup(translations[savedLang].sync);
        } else {
            clearChatAndShowWelcome(savedLang);
        }
    };

    // --- إعدادات خدمات جوجل للـ Authentication ---
    function initGoogleSignIn() {
        if (typeof google === 'undefined') return;
        
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleCredentialResponse
        });

        google.accounts.id.renderButton(
            document.getElementById("google-btn"),
            { theme: "dark", size: "small", type: "icon", shape: "circle" } 
        );
    }

    function handleCredentialResponse(response) {
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        const payload = JSON.parse(jsonPayload);
        
        currentUser = {
            name: payload.name,
            img: payload.picture,
            email: payload.email
        };

        localStorage.setItem('mirage_user', JSON.stringify(currentUser));
        updateAuthUI();
        
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        showPopup(translations[lang].login);
    }

    function updateAuthUI() {
        const container = document.getElementById('auth-container');
        if (currentUser) {
            container.innerHTML = `
                <div class="user-profile" title="${currentUser.email}">
                    <img src="${currentUser.img}" class="user-avatar" alt="profile">
                    <button class="logout-btn" onclick="handleLogout()">Logout</button>
                </div>
            `;
        } else {
            container.innerHTML = `<div id="google-btn"></div>`;
            initGoogleSignIn();
        }
    }

    function handleLogout() {
        localStorage.removeItem('mirage_user');
        currentUser = null;
        updateAuthUI();
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        showPopup(translations[lang].logout);
    }

    function showPopup(text) {
        const toast = document.getElementById('mirage-toast');
        toast.innerText = text;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function renderChat() {
        const display = document.getElementById('chat-display');
        display.innerHTML = '';
        memory.forEach(msg => {
            const div = document.createElement('div');
            div.className = `bubble ${msg.type}`;
            div.innerHTML = formatText(msg.text);
            display.appendChild(div);
        });
        display.scrollTop = display.scrollHeight;
    }

    function clearChatAndShowWelcome(lang) {
        const display = document.getElementById('chat-display');
        display.innerHTML = '';
        addBubble('ai-msg', translations[lang].welcome);
    }

    async function handleSend() {
        const input = document.getElementById('queryInput');
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        const query = input.value.trim();
        if (!query) return;

        const isMemActive = localStorage.getItem('mirage_mem_on') === 'true';

        if(!isMemActive && memory.length === 0) {
            document.getElementById('chat-display').innerHTML = '';
        }

        addBubble('user-msg', query);
        if(isMemActive) memory.push({type: 'user-msg', text: query});
        
        input.value = '';
        const loadingDiv = addBubble('ai-msg', translations[lang].waiting);

        try {
            const userContext = currentUser ? `The user's name is ${currentUser.name}. ` : '';
            const systemInstruction = encodeURIComponent(`${userContext}Format your output using clean markdown. Use clear headings, bullet points, and short paragraphs. Avoid dense walls of text. Always reply in the user's language.`);
            
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(query)}?system=${systemInstruction}`);
            const aiResponse = await response.text();
            
            loadingDiv.innerHTML = formatText(aiResponse.trim());
            
            if(isMemActive) {
                memory.push({type: 'ai-msg', text: aiResponse.trim()});
                saveToLocal();
            }
        } catch (e) { 
            loadingDiv.innerText = lang === 'ar' ? "خطأ في الاتصال بالشبكة." : (lang === 'fr' ? "Erreur de connexion." : "Error in connection."); 
        }
        document.getElementById('chat-display').scrollTop = document.getElementById('chat-display').scrollHeight;
    }

    function toggleMemory() {
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        const btn = document.getElementById('memBtn');
        const isActive = btn.classList.toggle('active');
        localStorage.setItem('mirage_mem_on', isActive);
        
        if(isActive) {
            showPopup(translations[lang].mem_on);
            saveToLocal();
        } else {
            localStorage.removeItem('mirage_history');
            memory = [];
            clearChatAndShowWelcome(lang);
            showPopup(translations[lang].mem_off);
        }
    }

    function saveToLocal() { 
        if(localStorage.getItem('mirage_mem_on') === 'true') {
            localStorage.setItem('mirage_history', JSON.stringify(memory.slice(-20))); 
        }
    }

    function addBubble(cls, txt) {
        const div = document.createElement('div');
        div.className = `bubble ${cls}`;
        div.innerHTML = formatText(txt);
        const display = document.getElementById('chat-display');
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
        return div;
    }

    function changeLang(l, updateWelcome = true) { 
        document.getElementById('html-tag').dir = (l === 'ar' ? 'rtl' : 'ltr'); 
        localStorage.setItem('mirage_lang', l); 
        document.getElementById('queryInput').placeholder = translations[l].placeholder;
        
        if(updateWelcome && localStorage.getItem('mirage_mem_on') !== 'true' && memory.length === 0) {
            clearChatAndShowWelcome(l);
        }
    }

    document.getElementById('queryInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') handleSend(); 
    });
</script>
</body>
</html>
