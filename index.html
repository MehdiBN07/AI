<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=500;900&family=Tajawal:wght=200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --led-glow: #008fcc; 
            --bg-dark: #02040a; 
            --glass-border: rgba(0, 210, 255, 0.2);
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }
        
        /* 🔒 حماية هيكل الموقع من التحديد */
        body, html { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Tajawal', sans-serif; 
            overflow: hidden; 
            -webkit-user-select: none; 
            -moz-user-select: none;    
            -ms-user-select: none;     
            user-select: none;         
        }

        /* 🔓 السماح بالتحديد والنسخ داخل الشات وحقول الإدخال فقط */
        input[type="text"], textarea, .edit-input-field, .bubble, .bubble * {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        /* تنسيق الروابط داخل الشات للتأكد من سهولة الضغط عليها */
        .bubble a {
            color: var(--neon-blue);
            text-decoration: underline;
            cursor: pointer;
            pointer-events: auto !important; /* ضمان استجابة الرابط للضغط */
        }

        .app-container { display: flex; height: 100%; width: 100%; position: relative; }

        /* القائمة الجانبية */
        .sidebar {
            width: var(--sidebar-width); background: #040814; border-left: 1px solid var(--glass-border);
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 30;
            position: absolute; top: 0; bottom: 0; right: 0; transform: translateX(100%);
        }
        html[dir="ltr"] .sidebar { border-left: none; border-right: 1px solid var(--glass-border); right: auto; left: 0; transform: translateX(-100%); }
        .app-container.sidebar-open .sidebar { transform: translateX(0); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }

        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 10px; }
        .mobile-controls-container { display: none; flex-direction: column; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 210, 255, 0.1); }

        .new-chat-btn { width: 100%; background: transparent; color: var(--neon-blue); border: 1px dashed var(--neon-blue); padding: 12px; border-radius: 8px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: bold; transition: 0.3s; }
        .new-chat-btn:hover { background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 10px var(--led-glow); }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-item-wrapper { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 8px; padding: 4px 12px; transition: 0.2s; cursor: pointer; }
        .chat-item-wrapper:hover, .chat-item-wrapper.active { background: rgba(0, 210, 255, 0.05); border-color: var(--glass-border); }

        .chat-title-text { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; padding: 8px 0; }
        html[dir="ltr"] .chat-title-text { text-align: left; }
        .chat-item-wrapper.active .chat-title-text { color: var(--neon-blue); font-weight: bold; }

        .delete-chat-btn { background: transparent; border: none; color: #ff4a4a; cursor: pointer; font-size: 13px; padding: 8px; opacity: 0.7; transition: 0.2s; }
        
        .main-shell { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; background: var(--bg-dark); }
        header { height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon-blue); z-index: 10; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); backdrop-filter: blur(15px); }

        .menu-toggle-btn { background: transparent; border: none; color: var(--neon-blue); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px 12px; }
        .header-controls { display: flex; align-items: center; gap: 12px; }
        #auth-container { display: flex; align-items: center; justify-content: center; }

        .custom-login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid var(--neon-blue);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
            max-width: 180px;
        }
        .custom-login-btn:hover {
            background: rgba(0, 210, 255, 0.15);
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .custom-login-btn img { width: 20px; height: 20px; object-fit: contain; border-radius: 50%; }
        .custom-login-btn span { color: #fff; font-size: 12px; font-weight: bold; font-family: 'Tajawal', sans-serif; white-space: nowrap; }

        .user-profile { display: flex; align-items: center; gap: 8px; background: rgba(0, 210, 255, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--neon-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .user-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--neon-blue); }
        .logout-btn { background: transparent; border: none; color: #ff4a4a; cursor: pointer; font-size: 13px; display: flex; align-items: center; }

        #chat-display { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 14px; padding-bottom: 140px; }

        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14.5px; line-height: 1.6; word-wrap: break-word; }
        .ai-msg { background: rgba(255, 255, 255, 0.03); align-self: flex-start; border: 1px solid rgba(0, 210, 255, 0.1); }
        
        .user-msg-container { display: flex; align-items: center; gap: 10px; align-self: flex-end; max-width: 85%; width: auto; }
        .user-msg { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon-blue); max-width: 100%; }
        
        .edit-msg-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); color: rgba(255,255,255,0.8); 
            cursor: pointer; font-size: 13px; width: 32px; height: 32px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; 
        }
        .edit-msg-btn:hover { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .edit-block-container { width: 100%; display: flex; flex-direction: column; gap: 8px; align-self: flex-end; max-width: 85%; }
        .edit-input-field { background: #111; color: #fff; border: 1px solid var(--neon-blue); border-radius: 12px; padding: 10px; width: 100%; font-family: 'Tajawal', sans-serif; font-size: 15px; resize: none; }
        .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .edit-actions button { padding: 6px 14px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: bold; }
        .save-edit-btn { background: var(--neon-blue); color: #000; }
        .cancel-edit-btn { background: #222; color: #fff; }

        .sidebar-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 25; display: none; }
        .app-container.sidebar-open .sidebar-overlay { display: block; }

        .bottom-fixed-area { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #000 80%, transparent); z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
        .copyright-bar { font-size: 9px; text-align: center; color: rgba(255, 255, 255, 0.3); padding: 8px 0; }
        .console-container { padding: 10px 15px 20px 15px; }
        
        .input-wrapper { display: flex; align-items: center; gap: 12px; background: #080808; padding: 8px 16px; border-radius: 30px; border: 1px solid var(--glass-border); }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 0; font-size: 16px; font-family: 'Tajawal', sans-serif; }
        
        .mem-toggle { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; filter: grayscale(1); transition: 0.3s; }
        .mem-toggle.active { border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.1); filter: grayscale(0); box-shadow: 0 0 10px var(--led-glow); }

        #send-btn { background: linear-gradient(45deg, var(--neon-blue), var(--led-glow)); color: #000; border-radius: 50%; width: 40px; height: 40px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #mirage-toast { position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid var(--neon-blue); color: #fff; padding: 15px 25px; border-radius: 15px; z-index: 1000; font-size: 13px; text-align: center; box-shadow: 0 0 30px var(--led-glow); opacity: 0; visibility: hidden; transition: 0.4s; pointer-events: none; max-width: 85%; }
        #mirage-toast.show { opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            header .header-controls { display: none; }
            .mobile-controls-container { display: flex; }
            .bubble { max-width: 90%; font-size: 13.5px; padding: 10px 14px; }
            .user-msg-container { max-width: 92%; }
            #chat-display { padding: 10px; padding-bottom: 130px; }
            .console-container { padding: 5px 10px 15px 10px; }
            .input-wrapper { padding: 4px 12px; gap: 8px; }
            input[type="text"] { font-size: 14px; }
            #send-btn { width: 36px; height: 36px; font-size: 16px; }
            .mem-toggle { width: 34px; height: 34px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="mirage-toast"></div>

<div class="app-container" id="app-shell">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="mobile-controls-container">
                <div id="mobile-auth-wrapper"></div>
                <select id="mobileLangSelect" onchange="changeLang(this.value)" style="background:#111; color:var(--neon-blue); border:1px solid #333; font-size:13px; border-radius:8px; padding: 8px; width:100%; cursor: pointer;">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
            <button class="new-chat-btn" id="newChatBtn" onclick="startNewChat()">+ محادثة جديدة</button>
        </div>
        <div class="chat-list" id="sessions-container"></div>
    </div>

    <div class="main-shell">
        <header>
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
                <h1 style="color: var(--neon-blue); font-size: 1.25rem; margin: 0; font-family: 'Orbitron', sans-serif; font-weight: 900;">MIRAGE AI</h1>
            </div>
            
            <div class="header-controls">
                <div id="auth-container"></div>
                <select id="langSelect" onchange="changeLang(this.value)" style="background:#111; color:var(--neon-blue); border:1px solid #333; font-size:11px; border-radius:8px; padding: 5px; cursor: pointer;">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>
        </header>

        <div id="chat-display"></div>

        <div class="bottom-fixed-area">
            <div class="copyright-bar">جميع الحقوق محفوظة لدى ORBIT SYSTEM © 2026</div>
            <div class="console-container">
                <div class="input-wrapper">
                    <div id="memBtn" class="mem-toggle" onclick="handleMemoryClick()" title="تفعيل المزامنة السحابية">🧠</div>
                    <input type="text" id="queryInput" placeholder="أرسل رسالة للمدار..." autocomplete="off">
                    <button id="send-btn" onclick="handleSend()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_CLIENT_ID = "86451093308-m5t74arb2v706v50qbls4pfoc4q4b0v1.apps.googleusercontent.com";
    const CLOUD_STORAGE_API = "https://kvbin.org/api/v1/bins/"; 
    const CUSTOM_LOGO_URL = "images.png";

    let allSessions = {}; 
    let currentSessionId = ""; 
    let currentUser = null;

    const translations = {
        ar: { btnNewChat: "+ محادثة جديدة", defaultChatTitle: "محادثة فارغة 🛸", placeholder: "أرسل رسالة للمدار...", waiting: "جاري الإجابة...", welcome: "وضع الحفظ المحلي نشط تلقائياً 💾. اضغط على الـ 🧠 لتفعيل السحاب المزامَن.", cancel: "إلغاء", save: "حفظ", loginText: "تسجيل الدخول" },
        en: { btnNewChat: "+ New Chat", defaultChatTitle: "Empty Orbit 🛸", placeholder: "Message Orbit...", waiting: "Answering...", welcome: "Local save mode is active 💾. Click 🧠 to enable synced Cloud Storage.", cancel: "Cancel", save: "Save", loginText: "Login" }
    };

    marked.setOptions({ gfm: true, breaks: true });

    window.onload = () => {
        const savedLang = localStorage.getItem('mirage_lang') || 'ar';
        document.getElementById('langSelect').value = savedLang;
        document.getElementById('mobileLangSelect').value = savedLang;
        changeLang(savedLang, false); 
        
        const savedUser = localStorage.getItem('mirage_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            updateAuthUI();
            fetchCloudSessions(); 
        } else {
            initGoogleSignIn();
            updateAuthUI();
            loadLocalSessions(); 
        }
    };

    function toggleSidebar() { document.getElementById('app-shell').classList.toggle('sidebar-open'); }

    function saveAllData() {
        if (currentUser) {
            saveToCloud();
        } else {
            localStorage.setItem('mirage_all_sessions', JSON.stringify(allSessions));
            localStorage.setItem('mirage_current_session', currentSessionId);
        }
    }

    function loadLocalSessions() {
        allSessions = JSON.parse(localStorage.getItem('mirage_all_sessions') || '{}');
        document.getElementById('memBtn').classList.remove('active'); 
        if (Object.keys(allSessions).length === 0) {
            startNewChat();
        } else {
            currentSessionId = localStorage.getItem('mirage_current_session') || Object.keys(allSessions)[0];
            if (!allSessions[currentSessionId]) currentSessionId = Object.keys(allSessions)[0];
            renderChat();
            renderSidebarList();
        }
    }

    async function saveToCloud() {
        const cloudKey = btoa(currentUser.email).replace(/=/g, "").substring(0, 15);
        try {
            await fetch(`${CLOUD_STORAGE_API}${cloudKey}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ allSessions, currentSessionId })
            });
        } catch (e) { console.log("خطأ في المزامنة السحابية."); }
    }

    async function fetchCloudSessions() {
        const cloudKey = btoa(currentUser.email).replace(/=/g, "").substring(0, 15);
        document.getElementById('memBtn').classList.add('active'); 
        try {
            const response = await fetch(`${CLOUD_STORAGE_API}${cloudKey}`);
            if (response.ok) {
                const data = await response.json();
                if (data && data.allSessions) {
                    allSessions = data.allSessions;
                    currentSessionId = data.currentSessionId || Object.keys(allSessions)[0];
                    renderChat();
                    renderSidebarList();
                    showPopup("☁️ تم مزامنة واسترجاع مدارك السحابي بنجاح!");
                    return;
                }
            }
        } catch (e) { console.log("بدء أول مزامنة سحابية."); }
        startNewChat();
    }

    function handleMemoryClick() {
        if (currentUser) {
            showPopup("☁️ المزامنة السحابية التلقائية نشطة عبر حسابك ومؤمنة!");
        } else {
            showPopup("🔐 يرجى فتح القائمة الجانبية وتوقيع الدخول لتفعيل السحاب المزامَن.");
            toggleSidebar();
        }
    }

    function startNewChat() {
        currentSessionId = "session_" + Date.now();
        allSessions[currentSessionId] = [];
        saveAllData();
        renderChat();
        renderSidebarList();
        document.getElementById('app-shell').classList.remove('sidebar-open');
    }

    function selectSession(id) {
        currentSessionId = id;
        saveAllData();
        renderChat();
        renderSidebarList();
        document.getElementById('app-shell').classList.remove('sidebar-open');
    }

    function deleteSession(id, event) {
        event.stopPropagation();
        delete allSessions[id];
        const remainingIds = Object.keys(allSessions);
        if (currentSessionId === id) {
            if (remainingIds.length > 0) currentSessionId = remainingIds[0];
            else startNewChat();
        }
        saveAllData();
        showPopup("تم حذف الجلسة بنجاح 🗑️");
        renderChat();
        renderSidebarList();
    }

    function renderSidebarList() {
        const container = document.getElementById('sessions-container');
        container.innerHTML = "";
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        
        Object.keys(allSessions).forEach(id => {
            const messages = allSessions[id];
            const firstUserMsg = messages.find(m => m.type === 'user-msg');
            const title = firstUserMsg ? firstUserMsg.text : translations[lang].defaultChatTitle;
            
            const wrapper = document.createElement('div');
            wrapper.className = `chat-item-wrapper ${id === currentSessionId ? 'active' : ''}`;
            wrapper.onclick = () => selectSession(id);

            const titleSpan = document.createElement('span');
            titleSpan.className = 'chat-title-text';
            titleSpan.innerText = title;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-chat-btn';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.onclick = (e) => deleteSession(id, e);

            wrapper.appendChild(titleSpan);
            wrapper.appendChild(deleteBtn);
            container.appendChild(wrapper);
        });
    }

    function renderChat() {
        const display = document.getElementById('chat-display');
        display.innerHTML = '';
        
        const currentMemory = allSessions[currentSessionId] || [];
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        const isRtl = document.getElementById('html-tag').dir === 'rtl';
        
        if (currentMemory.length === 0) {
            const welcomeText = currentUser ? (lang === 'ar' ? `مرحباً بك يا **${currentUser.name}** في مدارك السحابي التلقائي 🪐☁️.` : `Welcome **${currentUser.name}** to your auto cloud Orbit 🪐☁️.`) : translations[lang].welcome;
            addBubble('ai-msg', welcomeText);
        } else {
            currentMemory.forEach((msg, index) => {
                if (msg.type === 'user-msg') {
                    const container = document.createElement('div');
                    container.className = 'user-msg-container';
                    
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble user-msg';
                    bubble.innerHTML = marked.parse(msg.text);

                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-msg-btn';
                    editBtn.innerHTML = '✏️';
                    editBtn.onclick = () => openEditMode(index, container);

                    if (isRtl) {
                        container.appendChild(editBtn);
                        container.appendChild(bubble);
                    } else {
                        container.appendChild(bubble);
                        container.appendChild(editBtn);
                    }
                    display.appendChild(container);
                } else {
                    const div = document.createElement('div');
                    div.className = `bubble ${msg.type}`;
                    div.innerHTML = marked.parse(msg.text);
                    display.appendChild(div);
                }
            });
        }
        display.scrollTop = display.scrollHeight;
    }

    async function handleSend() {
        const input = document.getElementById('queryInput');
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        const query = input.value.trim();
        if (!query) return;

        if(!allSessions[currentSessionId]) allSessions[currentSessionId] = [];
        allSessions[currentSessionId].push({type: 'user-msg', text: query});
        
        saveAllData();
        renderChat();
        renderSidebarList();

        input.value = '';
        const loadingDiv = addBubble('ai-msg', translations[lang].waiting);

        try {
            const userContext = currentUser ? `The user's name is ${currentUser.name}. ` : '';
            const systemInstruction = encodeURIComponent(`${userContext}Format using clean markdown. Reply in user's language.`);
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(query)}?system=${systemInstruction}`);
            const aiResponse = await response.text();
            
            loadingDiv.innerHTML = marked.parse(aiResponse.trim());
            allSessions[currentSessionId].push({type: 'ai-msg', text: aiResponse.trim()});
            
            saveAllData(); 
        } catch (e) { 
            loadingDiv.innerText = "خطأ في الاتصال بالشبكة."; 
        }
    }

    function openEditMode(index, containerElement) {
        const originalText = allSessions[currentSessionId][index].text;
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        containerElement.className = 'edit-block-container';
        containerElement.innerHTML = `
            <textarea class="edit-input-field" id="edit-area-${index}">${originalText}</textarea>
            <div class="edit-actions">
                <button class="cancel-edit-btn" onclick="renderChat()">${translations[lang].cancel}</button>
                <button class="save-edit-btn" onclick="saveEditedMessage(${index})">${translations[lang].save}</button>
            </div>
        `;
    }

    async function saveEditedMessage(index) {
        const newText = document.getElementById(`edit-area-${index}`).value.trim();
        if (!newText) return;

        allSessions[currentSessionId][index].text = newText;
        allSessions[currentSessionId] = allSessions[currentSessionId].slice(0, index + 1);
        
        saveAllData();
        renderChat();

        const lang = localStorage.getItem('mirage_lang') || 'ar';
        const loadingDiv = addBubble('ai-msg', translations[lang].waiting);

        try {
            const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(newText)}`);
            const aiResponse = await response.text();
            loadingDiv.innerHTML = marked.parse(aiResponse.trim());
            allSessions[currentSessionId].push({type: 'ai-msg', text: aiResponse.trim()});
            saveAllData();
        } catch (e) { loadingDiv.innerText = "خطأ."; }
    }

    function initGoogleSignIn() {
        if (typeof google === 'undefined') return;
        google.accounts.id.initialize({ 
            client_id: GOOGLE_CLIENT_ID, 
            callback: handleCredentialResponse 
        });
    }

    function triggerGoogleAuth() {
        if (typeof google !== 'undefined') {
            google.accounts.id.prompt();
        }
    }

    function handleCredentialResponse(response) {
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(window.atob(base64));
        currentUser = { name: payload.given_name || payload.name, img: payload.picture, email: payload.email };
        localStorage.setItem('mirage_user', JSON.stringify(currentUser));
        updateAuthUI();
        fetchCloudSessions(); 
    }

    function updateAuthUI() {
        const desktopContainer = document.getElementById('auth-container');
        const mobileWrapper = document.getElementById('mobile-auth-wrapper');
        const lang = localStorage.getItem('mirage_lang') || 'ar';
        
        if (currentUser) {
            const profileHTML = `
                <div class="user-profile">
                    <img src="${currentUser.img}" class="user-avatar">
                    <span style="font-size:11px; font-weight:bold; color:var(--neon-blue); max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${currentUser.name}</span>
                    <button class="logout-btn" onclick="handleLogout()">🚪</button>
                </div>
            `;
            if(desktopContainer) desktopContainer.innerHTML = profileHTML;
            if(mobileWrapper) mobileWrapper.innerHTML = profileHTML;
        } else {
            const customLoginHTML = `
                <div class="custom-login-btn" onclick="triggerGoogleAuth()">
                    <img src="${CUSTOM_LOGO_URL}" alt="Logo" onerror="this.src='https://www.google.com/favicon.ico'">
                    <span>${translations[lang].loginText}</span>
                </div>
            `;
            if(desktopContainer) desktopContainer.innerHTML = customLoginHTML;
            if(mobileWrapper) mobileWrapper.innerHTML = customLoginHTML;
        }
    }

    function handleLogout() {
        localStorage.removeItem('mirage_user');
        currentUser = null;
        updateAuthUI();
        loadLocalSessions(); 
        showPopup("تم الخروج والعودة لحفظ المتصفح المحلي 💾");
    }

    function showPopup(text) {
        const toast = document.getElementById('mirage-toast');
        toast.innerText = text;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    function addBubble(cls, txt) {
        const div = document.createElement('div'); div.className = `bubble ${cls}`;
        div.innerHTML = marked.parse(txt);
        const display = document.getElementById('chat-display'); display.appendChild(div);
        display.scrollTop = display.scrollHeight; return div;
    }

    function changeLang(l, updateWelcome = true) { 
        document.getElementById('html-tag').dir = (l === 'ar' ? 'rtl' : 'ltr'); 
        localStorage.setItem('mirage_lang', l); 
        document.getElementById('langSelect').value = l;
        document.getElementById('mobileLangSelect').value = l;
        document.getElementById('newChatBtn').innerText = translations[l].btnNewChat;
        document.getElementById('queryInput').placeholder = translations[l].placeholder;
        
        updateAuthUI();
        renderSidebarList();
        if(updateWelcome) renderChat();
    }

    document.getElementById('queryInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });

    // ==========================================
    // 🔒 نظام الحماية المطور للموقع مع استثناء المحادثات
    // ==========================================
    
    // 1. منع استخدام القائمة اليمنى (Right Click)
    document.addEventListener('contextmenu', function(e) {
        // إذا كان الضغط الماوس الأيمن حدث فوق رابط، نتركه يعمل بشكل طبيعي لفتحه
        if (e.target.tagName === 'A') return;
        
        e.preventDefault();
        showPopup("🔒 عذراً، تم تعطيل القائمة اليمنى لحماية النظام.");
    });

    // 2. حظر اختصارات لوحة المفاتيح الشهيرة مع مراعاة السماح بالنسخ Ctrl+C داخل الشات
    document.addEventListener('keydown', function(e) {
        // حظر مفتاح F12
        if (e.key === 'F12') {
            e.preventDefault();
            showPopup("🔒 أدوات المطورين معطلة.");
            return false;
        }

        // حظر Ctrl+Shift+I و Ctrl+Shift+J و Ctrl+Shift+C (أدوات فحص العناصر)
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
            e.preventDefault();
            showPopup("🔒 تم حظر الوصول لأدوات المطور.");
            return false;
        }

        // حظر Ctrl+U (عرض سورس كود الصفحة)
        if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
            e.preventDefault();
            showPopup("🔒 عرض كود المصدر غير متاح.");
            return false;
        }

        // حظر اختصار الحفظ Ctrl+S
        if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
            e.preventDefault();
            showPopup("🔒 حفظ الصفحة غير مسموح.");
            return false;
        }

        // السماح بـ Ctrl+C فقط إذا كان التحديد داخل منطقة الشات والفقاعات
        if (e.ctrlKey && (e.key === 'C' || e.key === 'c')) {
            const selectedNode = window.getSelection().anchorNode;
            if (selectedNode) {
                const parentBubble = selectedNode.parentElement.closest('.bubble');
                // إذا كان التحديد خارج فقاعات الرسائل، نمنع النسخ
                if (!parentBubble) {
                    e.preventDefault();
                    showPopup("🔒 النسخ متاح فقط لمحتوى الإجابات والأسئلة.");
                    return false;
                }
            }
        }
    });
</script>
</body>
</html>
