<!DOCTYPE html>
<html id="html-tag" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MIRAGE AI | ORBIT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Tajawal:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --neon-blue: #00d2ff; --led-glow: #008fcc; --bg-dark: #02040a; --glass-border: rgba(0, 210, 255, 0.2); --sidebar-width: 280px; }
        /* (تم الاحتفاظ بجميع تنسيقاتك الأصلية كما هي) */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }
        body, html { height: 100%; margin: 0; padding: 0; background: var(--bg-dark); color: #fff; font-family: 'Tajawal', sans-serif; overflow: hidden; user-select: none; }
        input[type="text"], textarea, .bubble { user-select: text !important; }
        .app-container { display: flex; height: 100%; width: 100%; position: relative; }
        .sidebar { width: var(--sidebar-width); background: #040814; border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 30; position: absolute; top: 0; bottom: 0; right: 0; transform: translateX(100%); }
        .app-container.sidebar-open .sidebar { transform: translateX(0); }
        .main-shell { flex: 1; display: flex; flex-direction: column; height: 100%; background: var(--bg-dark); }
        /* تنسيقات التقييم الجديدة */
        .reviews-section { padding: 15px; border-top: 1px solid var(--glass-border); margin-top: auto; color: white; }
        .review-card { background: rgba(255,255,255,0.05); padding: 10px; margin: 8px 0; border-radius: 8px; border-right: 3px solid var(--neon-blue); font-size: 13px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:#0a0e1a; border:1px solid var(--neon-blue); padding:25px; border-radius:20px; width:90%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div id="review-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--neon-blue);">أضف تقييمك</h3>
        <textarea id="review-text-input" style="width:100%; height:80px; background:#151a28; color:white; border:1px solid #333; border-radius:10px; padding:10px;"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeReviewModal()" style="flex:1; background:#333; border:none; color:white; padding:10px; border-radius:10px; cursor:pointer;">إلغاء</button>
            <button onclick="submitReviewFromModal()" style="flex:1; background:var(--neon-blue); border:none; color:black; padding:10px; border-radius:10px; cursor:pointer;">إرسال</button>
        </div>
    </div>
</div>

<div class="app-container" id="app-shell">
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="startNewChat()">+ محادثة جديدة</button>
        </div>
        <div class="chat-list" id="sessions-container"></div>
        <div class="reviews-section">
            <h4 style="color:var(--neon-blue); margin-top:0;">تقييمات المستخدمين:</h4>
            <div id="reviews-list"></div>
            <button onclick="openReviewModal()" style="width:100%; padding:8px; background:transparent; border:1px solid var(--neon-blue); color:white; border-radius:5px; cursor:pointer;">إضافة تقييم</button>
        </div>
    </div>
    </div>

<script>
    // إعداد Firebase للتقييمات
    const firebaseConfig = { apiKey: "AIzaSyAGlPJDsGdA6Y2BShTy3LJeguYfT5ahfgI", authDomain: "mirageai-1ff67.firebaseapp.com", projectId: "mirageai-1ff67", storageBucket: "mirageai-1ff67.appspot.com", messagingSenderId: "54774597616", appId: "1:54774597616:web:c084ed8283943d51b7bf35" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دوال التقييم
    function openReviewModal() {
        if(!currentUser) return showPopup("سجل دخولك أولاً!");
        document.getElementById('review-modal').style.display = 'flex';
    }
    function closeReviewModal() { document.getElementById('review-modal').style.display = 'none'; }
    function submitReviewFromModal() {
        const text = document.getElementById('review-text-input').value;
        if(text.trim()) {
            db.collection("reviews").add({ text, user: currentUser.name, email: currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('review-text-input').value = "";
            closeReviewModal();
        }
    }
    function loadReviews() {
        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('reviews-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `<div class="review-card"><strong>${data.user}:</strong> ${data.text}</div>`;
            });
        });
    }

    // --- (أضف دالة loadReviews(); داخل window.onload الأصلي الخاص بك) ---
</script>
</body>
</html>
